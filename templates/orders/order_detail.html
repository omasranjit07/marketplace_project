{% extends 'base.html' %}

{% block content %}
<h2>Order Details</h2>

<p>Order ID: {{ order.id }}</p>
<p>Total: ${{ order.total_amount }}</p>

<h3>Items:</h3>

{% for item in order.orderitem_set.all %}
    <p>{{ item.product.title }} - {{ item.quantity }}</p>
{% empty %}
    <p>No items found for this order.</p>
{% endfor %}
{% endblock %}
