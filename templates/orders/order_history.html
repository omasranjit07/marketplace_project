{% extends 'base.html' %}

{% block content %}
<h2>My Orders</h2>

{% for order in orders %}
    <div>
        <a href="{% url 'order_detail' order.id %}">
    Order ID: {{ order.id }}
        </a>
        <p>Total: ${{ order.total_amount }}</p>
        <p>Status: {{ order.status }}</p>
        <p>Date: {{ order.created_at }}</p>
        <hr>
    </div>

{% empty %}
    <p>No orders yet.</p>
{% endfor %}
{% endblock %}
