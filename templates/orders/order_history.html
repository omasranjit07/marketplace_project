{% extends 'base.html' %}

{% block content %}
<h2>My Orders</h2>

{% for order in orders %}
    <div>
        <p>Order ID: {{ order.id }}</p>
        <p>Total: ${{ order.total_amount }}</p>
        <p>Status: {{ order.status }}</p>
        <p>Date: {{ order.created_at }}</p>
    </div>
    <hr>
{% empty %}
    <p>No orders found.</p>
{% endfor %}
{% endblock %}
