{% extends 'base.html' %}

{% block content %}
<h2>{{ product.title }}</h2>

{% if product.image %}
    <img src="{{ product.image.url }}" width="250">
{% endif %}

<p>{{ product.description }}</p>
<p>Price: ${{ product.price }}</p>
<p>Stock: {{ product.stock }}</p>
<p>Seller: {{ product.seller.username }}</p>

<a href="{% url 'add_to_cart' product.id %}">Add to Cart</a>
{% endblock %}
